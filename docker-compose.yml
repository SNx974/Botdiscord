# Production stack for Dokploy (Docker Compose application type).
# All values come from environment variables set in the Dokploy project —
# see .env.example for the full list. Internal services talk to each other
# over the compose network using their service name as hostname.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-matchmaking_akd}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_MATCH_CATEGORY_ID: ${DISCORD_MATCH_CATEGORY_ID}
      DISCORD_ADMIN_ROLE_ID: ${DISCORD_ADMIN_ROLE_ID}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      BOT_HTTP_PORT: 4001

  realtime:
    build:
      context: .
      dockerfile: apps/realtime/Dockerfile
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      REDIS_URL: ${REDIS_URL}
      REALTIME_PORT: 4002
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/run/secrets/gcp-vision-key.json}
    # Mount the GCP Vision service-account key as a file via Dokploy's
    # "Mounts" tab for this service (host/secret path -> /run/secrets/gcp-vision-key.json).

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_REALTIME_URL: ${NEXT_PUBLIC_REALTIME_URL}
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - bot
      - realtime
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      BOT_INTERNAL_URL: http://bot:4001
      REALTIME_URL: http://realtime:4002
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_REGION: ${S3_REGION}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
