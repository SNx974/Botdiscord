# Production stack for Dokploy (Docker Compose application type).
# Postgres and Redis are NOT bundled here — they're provisioned as separate
# Dokploy "Database" resources (DATABASE_URL / REDIS_URL point at those).
# All values come from environment variables set in the Dokploy project —
# see .env.example for the full list. Every service joins Dokploy's shared
# external network so it can resolve those resources' internal hostnames
# (and each other) by name — without this, compose would create its own
# isolated network and DNS lookups for the DB/Redis hosts would fail.
networks:
  dokploy-network:
    external: true

services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    networks:
      - dokploy-network
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000" # S3 API — must stay open, S3_PUBLIC_URL points here
      - "9001:9001" # web console (optional, browse at http://<server-ip>:9001)

  # One-shot: creates the bucket and makes it publicly downloadable, then exits.
  minio-init:
    image: minio/mc:latest
    networks:
      - dokploy-network
    depends_on:
      - minio
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY}; do sleep 1; done;
      mc mb --ignore-existing local/${S3_BUCKET};
      mc anonymous set download local/${S3_BUCKET};
      exit 0;
      "

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      DISCORD_MATCH_CATEGORY_ID: ${DISCORD_MATCH_CATEGORY_ID}
      DISCORD_ADMIN_ROLE_ID: ${DISCORD_ADMIN_ROLE_ID}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      API_PORT: ${API_PORT:-4001}

  realtime:
    build:
      context: .
      dockerfile: apps/realtime/Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    environment:
      REDIS_URL: ${REDIS_URL}
      API_PORT: ${API_PORT:-4002}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      OCR_PROVIDER: ${OCR_PROVIDER:-vision}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-/run/secrets/gcp-vision-key.json}
    # Only needed when OCR_PROVIDER=vision: mount the GCP service-account key
    # via Dokploy's "Mounts" tab on this service -> /run/secrets/gcp-vision-key.json.

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_REALTIME_URL: ${NEXT_PUBLIC_REALTIME_URL}
    restart: unless-stopped
    networks:
      - dokploy-network
    depends_on:
      - bot
      - realtime
      - minio
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      BOT_INTERNAL_URL: http://bot:${API_PORT:-4001}
      REALTIME_URL: http://realtime:${API_PORT:-4002}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_REGION: ${S3_REGION}
    # No host port mapping: route this through Dokploy's Domains tab instead
    # (Service Name: web, Container Port: 3000) — Traefik reaches it over the
    # compose network. A direct "3000:3000" binding conflicts with anything
    # else on the host using that port.

volumes:
  minio_data:
